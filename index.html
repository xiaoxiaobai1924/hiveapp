<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🐝 蜂巢APP</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        .bee {
            font-size: 60px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .status {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bee">🐝</div>
        <h1>蜂巢APP</h1>
        <div class="status">
            ✅ GitHub Pages部署成功！<br>
            🚀 使用免费托管服务<br>
            📅 <span id="time"></span>
        </div>
        <p>GitHub用户: xiaoxiaobai1924</p>
        <p>访问地址: https://xiaoxiaobai1924.github.io/hiveapp</p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        document.querySelector('.bee').addEventListener('click', function() {
            this.style.transform = 'scale(1.3) rotate(10deg)';
            setTimeout(() => this.style.transform = 'scale(1) rotate(0deg)', 300);
        });
    </script>
</body>
</html>
